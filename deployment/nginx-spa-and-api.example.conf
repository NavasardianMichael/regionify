# Example: Nginx for Regionify static client + Docker API (see docker-compose.prod.yml port 9002).
# Replace APP_DIR and ssl_certificate paths. Test: `sudo nginx -t` then reload.
#
# If you see: "rewrite or internal redirection cycle while internally redirecting to /index.html"
# — remove any `error_page 404 = /index.html` (or /index.html fallback) that runs together with
# `try_files … /index.html`, and ensure `root` really contains a real index.html file.

server {
    listen 443 ssl http2;
    server_name regionify.mnavasardian.com;  # your domain

    # SPA root — must contain index.html (deploy: $APP_DIR/client/current)
    root /ABSOLUTE/PATH/TO/client/current;
    index index.html;

    # Avoid "rewrite or internal redirection cycle" to /index.html:
    # use try_files so a real /index.html is served as a file, not re-entrant error_page hacks.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Browsers request this; optional explicit mapping if asset paths differ
    location = /favicon.ico {
        try_files $uri =404;
        access_log off;
        log_not_found off;
    }

    # API on same host — only if `VITE_API_BASE_URL` uses this host with an `/api` prefix
    # (e.g. https://regionify.example.com/api). Strips `/api` so upstream receives /auth, /projects, …
    location /api/ {
        proxy_pass http://127.0.0.1:9002/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # If the app uses a separate api.* origin for `VITE_API_BASE_URL`, configure that host in
    # another `server { ... }` block with `proxy_pass http://127.0.0.1:9002;` for `/`.

    # If you terminate TLS elsewhere, still use ssl_* here or adjust listen.
    # ssl_certificate     /etc/letsencrypt/live/.../fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/.../privkey.pem;
}
