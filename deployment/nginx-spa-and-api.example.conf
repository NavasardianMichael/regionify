# Example: Nginx for Regionify with two server blocks (SPA + dedicated API subdomain).
# - SPA host (regionify.pro) serves the static client and SSRs /embed/<token>.
# - API host (api.regionify.pro) proxies everything to the Docker API on 127.0.0.1:9002,
#   preserving the URI so Express receives /auth/..., /projects/..., /payments/webhook, etc.
# Replace APP_DIR and ssl_certificate paths. Test: `sudo nginx -t` then reload.
#
# Build the client with VITE_API_BASE_URL=https://api.regionify.pro (no path suffix);
# every endpoint module in client/src/api/*/endpoints.ts appends /auth, /projects, ... to it.
#
# If you see: "rewrite or internal redirection cycle while internally redirecting to /index.html"
# — remove any `error_page 404 = /index.html` (or /index.html fallback) that runs together with
# `try_files … /index.html`, and ensure `root` really contains a real index.html file.

# ── SPA host ─────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name regionify.pro;  # your domain

    # SPA root — must contain index.html (deploy: $APP_DIR/client/current)
    root /ABSOLUTE/PATH/TO/client/current;
    index index.html;

    # Public embed pages: HTML must come from Node (per-token title, meta, <h1>, JSON-LD).
    # If omitted, try_files below serves generic index.html and crawlers/social previews miss embed SEO.
    location ~ ^/embed/[^/]+$ {
        proxy_pass http://127.0.0.1:9002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Hashed build assets: never fall back to index.html (wrong MIME type for .js/.css).
    location /assets/ {
        try_files $uri =404;
    }

    # Avoid "rewrite or internal redirection cycle" to /index.html:
    # use try_files so a real /index.html is served as a file, not re-entrant error_page hacks.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Browsers request this; optional explicit mapping if asset paths differ
    location = /favicon.ico {
        try_files $uri =404;
        access_log off;
        log_not_found off;
    }

    # If you terminate TLS elsewhere, still use ssl_* here or adjust listen.
    # ssl_certificate     /etc/letsencrypt/live/regionify.pro/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/regionify.pro/privkey.pem;
}

# ── API host ─────────────────────────────────────────────────────────────────
# proxy_pass MUST omit a trailing slash and any path so the URI is forwarded
# as-is. Example: GET https://api.regionify.pro/auth/me reaches
# Express as GET /auth/me (matches `app.use(apiRoutes)` in server/src/app.ts).
server {
    listen 443 ssl http2;
    server_name api.regionify.pro;  # your API subdomain

    location / {
        proxy_pass http://127.0.0.1:9002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ssl_certificate     /etc/letsencrypt/live/api.regionify.pro/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.regionify.pro/privkey.pem;
}
