server {
    listen 80;
    listen [::]:80;
    server_name regionify.pro www.regionify.pro;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name regionify.pro www.regionify.pro;

    ssl_certificate /etc/letsencrypt/live/regionify.pro/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/regionify.pro/privkey.pem; # managed by Certbot

    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /home/michael/apps/regionify/client/current;
    index index.html;

    if ($host = www.regionify.pro) {
        return 301 https://regionify.pro$request_uri;
    }

    # Public marketing pages: confirmed zero path overlap with server/src/routes/*.ts,
    # so safe to always proxy to Node for correct per-route <title>/canonical/JSON-LD.
    # /contact is deliberately NOT included — it collides with POST /contact in
    # server/src/routes/contact.ts and would 404 today (see docs/SEO_INDEXING_ARCHITECTURE.md).
    # Everything NOT listed here (/contact, /billing, /login, /projects*, /auth/*,
    # /payments/*, ...) keeps the static-shell fallback in `location /` below —
    # those paths overlap with real API routes on this same Node process (e.g. GET
    # /projects/:id also matches the literal SPA paths /projects/new, /projects/edit).
    location = / {
        proxy_pass http://127.0.0.1:9002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location ~ ^/(about|faq|terms|privacy|refund)$ {
        proxy_pass http://127.0.0.1:9002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SEO endpoints: must be served by Node (dynamic XML/text with real Sitemap URL).
    # Without these, try_files below returns the SPA index.html for /sitemap.xml and
    # the static client/public placeholder for /robots.txt — both wrong for crawlers.
    location = /robots.txt {
        proxy_pass http://127.0.0.1:9002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /sitemap.xml {
        proxy_pass http://127.0.0.1:9002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /app-sitemap.xml {
        proxy_pass http://127.0.0.1:9002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }


    location ~ ^/embed/[^/]+$ {
        proxy_pass http://127.0.0.1:9002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Astro marketing pages (base: '/marketing')
    location /marketing {
        alias /home/michael/apps/regionify/marketing/current;
        index index.html;
        error_page 404 /marketing/404.html;
        try_files $uri $uri/ =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Served straight from disk; no need to hit Node for the browser's automatic favicon request.
    location = /favicon.ico {
        try_files $uri =404;
        access_log off;
        log_not_found off;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss text/javascript;
    gzip_min_length 256;
}
