# ==============================================================================
# Build and Deploy to Production Server
# ==============================================================================
# REQUIRED GITHUB SECRETS:
# - SSH_HOST, SSH_USER, SSH_KEY, SSH_PORT (optional, default 22)
# - APP_DIR: Deployment root (e.g. /home/user/apps/regionify)
# - ENV_FILE_BASE64: Base64-encoded server .env.production (POSTGRES_*, app vars)
# - VITE_API_BASE_URL: Client API base URL (client builds only)
#
# On-host layout after deploy:
#   $APP_DIR/client/releases/<sha>/  and  $APP_DIR/client/current -> releases/<sha>
#   $APP_DIR/server/.env.production  (persistent; not inside a release)
#   $APP_DIR/server/releases/<sha>/  and  $APP_DIR/server/current -> releases/<sha>
# Run: cd $APP_DIR/server/current && export REGIONIFY_ENV_FILE=$APP_DIR/server/.env.production && docker compose -f docker-compose.prod.yml ...
#
# Migration: if you used $APP_DIR/docker before, compose down from there once, deploy
# from CI, then remove the old docker/ tree. Align docker volume project name with
# compose `name:` (see docker-compose.prod.yml) so Postgres/Redis data stay attached.
# ==============================================================================

name: Deploy to Production

on:
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.cursorrules'

permissions:
  contents: read
  actions: write

env:
  NODE_VERSION: '24'
  PNPM_VERSION: '10'
  KEEP_RELEASES: 5
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      deploy_client: ${{ steps.flags.outputs.deploy_client }}
      deploy_server: ${{ steps.flags.outputs.deploy_server }}
      needs_client_build: ${{ steps.flags.outputs.needs_client_build }}
      release_name: ${{ github.sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Path filters
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            client_pkg:
              - 'client/**'
            server_pkg:
              - 'server/**'
            shared_pkg:
              - 'shared/**'
            workspace:
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.json'
              - 'docker-compose.prod.yml'
              - 'server/Dockerfile'
              - '.github/workflows/deploy.yml'

      - name: Set deploy flags
        id: flags
        run: |
          deploy_client=false
          deploy_server=false
          if [ "${{ steps.filter.outputs.client_pkg }}" = "true" ] || \
             [ "${{ steps.filter.outputs.shared_pkg }}" = "true" ] || \
             [ "${{ steps.filter.outputs.workspace }}" = "true" ]; then
            deploy_client=true
          fi
          if [ "${{ steps.filter.outputs.server_pkg }}" = "true" ] || \
             [ "${{ steps.filter.outputs.shared_pkg }}" = "true" ] || \
             [ "${{ steps.filter.outputs.workspace }}" = "true" ]; then
            deploy_server=true
          fi
          # Client must be built when either side deploys (server Docker image includes client/dist).
          needs_client_build=false
          if [ "$deploy_client" = "true" ] || [ "$deploy_server" = "true" ]; then
            needs_client_build=true
          fi
          echo "deploy_client=$deploy_client" >> "$GITHUB_OUTPUT"
          echo "deploy_server=$deploy_server" >> "$GITHUB_OUTPUT"
          echo "needs_client_build=$needs_client_build" >> "$GITHUB_OUTPUT"
          echo "deploy_client=$deploy_client deploy_server=$deploy_server needs_client_build=$needs_client_build"

  build-client:
    name: Build / client
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.needs_client_build == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build client (and shared)
        run: pnpm run build:client
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Create client archive
        run: tar -czf client-build.tar.gz -C client/dist/client .

      - name: Upload client artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-build
          path: client-build.tar.gz
          retention-days: 1

  build-server:
    name: Build / server
    runs-on: ubuntu-latest
    needs: [changes, build-client]
    if: needs.changes.outputs.deploy_server == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download client build artifact
        uses: actions/download-artifact@v4
        with:
          name: client-build

      - name: Extract client build into client/dist/client
        run: |
          mkdir -p client/dist/client
          tar -xzf client-build.tar.gz -C client/dist/client

      - name: Build server (client already built)
        run: pnpm run build:server

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify server Docker image builds
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          push: false
          load: true
          tags: regionify-server:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create server archive
        run: |
          tar -czf server-build.tar.gz \
            --exclude='node_modules' \
            --exclude='client/src' \
            --exclude='.git' \
            server shared client docker-compose.prod.yml package.json pnpm-lock.yaml pnpm-workspace.yaml tsconfig.json

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-build
          path: server-build.tar.gz
          retention-days: 1

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [changes, build-client, build-server]
    if: |
      always() &&
      (needs.changes.outputs.deploy_client == 'true' || needs.changes.outputs.deploy_server == 'true') &&
      (needs.build-client.result == 'success' || needs.build-client.result == 'skipped') &&
      (needs.build-server.result == 'success' || needs.build-server.result == 'skipped') &&
      needs.build-client.result != 'failure' &&
      needs.build-server.result != 'failure'
    steps:
      - name: Download client artifact
        if: needs.changes.outputs.deploy_client == 'true'
        uses: actions/download-artifact@v4
        with:
          name: client-build

      - name: Download server artifact
        if: needs.changes.outputs.deploy_server == 'true'
        uses: actions/download-artifact@v4
        with:
          name: server-build

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.SSH_PORT || 22 }}" "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Prepare server env file
        if: needs.changes.outputs.deploy_server == 'true'
        run: |
          echo "${{ secrets.ENV_FILE_BASE64 }}" | base64 -d | tr -d '\r' > /tmp/env.production
          echo "Env file: $(wc -c < /tmp/env.production) bytes, $(wc -l < /tmp/env.production) lines"

      - name: Copy server bundle to host
        if: needs.changes.outputs.deploy_server == 'true'
        run: |
          scp -P "${{ secrets.SSH_PORT || 22 }}" \
            server-build.tar.gz \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/tmp/"

      - name: Copy env to host
        if: needs.changes.outputs.deploy_server == 'true'
        run: |
          scp -P "${{ secrets.SSH_PORT || 22 }}" \
            /tmp/env.production \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/tmp/env.production"

      - name: Deploy server
        if: needs.changes.outputs.deploy_server == 'true'
        run: |
          ssh -p "${{ secrets.SSH_PORT || 22 }}" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" bash -s -- \
            "${{ secrets.APP_DIR }}" \
            "${{ needs.changes.outputs.release_name }}" \
            "${{ env.KEEP_RELEASES }}" << 'EOF'
          set -e
          APP_DIR="$1"
          RELEASE_NAME="$2"
          KEEP_RELEASES="$3"
          RELEASES_DIR="$APP_DIR/server/releases"
          NEW_RELEASE="$RELEASES_DIR/$RELEASE_NAME"
          ENV_TARGET="$APP_DIR/server/.env.production"

          echo "Deploying server release: $RELEASE_NAME"
          mkdir -p "$APP_DIR/server" "$RELEASES_DIR"
          mkdir -p "$NEW_RELEASE"
          tar -xzf /tmp/server-build.tar.gz -C "$NEW_RELEASE"
          install -m 600 /tmp/env.production "$ENV_TARGET"
          ln -sfn "$NEW_RELEASE" "$APP_DIR/server/current"
          cd "$APP_DIR/server/current"
          export REGIONIFY_ENV_FILE="$ENV_TARGET"

          echo "Verifying env file at $ENV_TARGET"
          ENV_LINES=$(wc -l < "$ENV_TARGET")
          ENV_SIZE=$(wc -c < "$ENV_TARGET")
          echo "  Lines: $ENV_LINES, Size: $ENV_SIZE bytes"
          echo "  Variables found:"
          sed -n 's/^\([A-Z_]*\)=.*/    - \1/p' "$ENV_TARGET"

          # Compose-managed containers only: `down` does not remove orphans that lost
          # project labels (e.g. old fixed container_name). Those still block names or
          # volumes. Drop legacy names explicitly; named volumes are preserved (no -v).
          export COMPOSE_PROJECT_NAME=regionify
          docker compose -f docker-compose.prod.yml down --remove-orphans || true
          docker rm -f regionify-redis regionify-postgres regionify-server \
                      regionify-redis-1 regionify-postgres-1 regionify-server-1 2>/dev/null || true
          docker compose -f docker-compose.prod.yml build server
          docker compose -f docker-compose.prod.yml up -d --remove-orphans

          docker image prune -f
          cd "$RELEASES_DIR" && ls -t | tail -n +$((KEEP_RELEASES + 1)) | xargs -r rm -rf
          rm -f /tmp/server-build.tar.gz /tmp/env.production
          echo "Server deployed"
          EOF

      - name: Copy client bundle to host
        if: needs.changes.outputs.deploy_client == 'true'
        run: |
          scp -P "${{ secrets.SSH_PORT || 22 }}" \
            client-build.tar.gz \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/tmp/"

      - name: Deploy client
        if: needs.changes.outputs.deploy_client == 'true'
        run: |
          ssh -p "${{ secrets.SSH_PORT || 22 }}" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" bash -s -- \
            "${{ secrets.APP_DIR }}" \
            "${{ needs.changes.outputs.release_name }}" \
            "${{ env.KEEP_RELEASES }}" << 'EOF'
          set -e
          APP_DIR="$1"; RELEASE_NAME="$2"; KEEP_RELEASES="$3"
          RELEASES_DIR="$APP_DIR/client/releases"
          NEW_RELEASE="$RELEASES_DIR/$RELEASE_NAME"

          echo "Deploying client: $RELEASE_NAME"
          mkdir -p "$NEW_RELEASE"
          tar -xzf /tmp/client-build.tar.gz -C "$NEW_RELEASE"
          chmod -R 755 "$NEW_RELEASE"
          ln -sfn "$NEW_RELEASE" "$APP_DIR/client/current"

          cd "$RELEASES_DIR" && ls -t | tail -n +$((KEEP_RELEASES + 1)) | xargs -r rm -rf
          rm -f /tmp/client-build.tar.gz
          echo "Client deployed"
          EOF

      - name: Deployment summary
        run: |
          echo "## Deployment complete" >> "$GITHUB_STEP_SUMMARY"
          echo "**Release:** \`${{ needs.changes.outputs.release_name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ needs.changes.outputs.deploy_server }}" = "true" ]; then
            echo "- Server (Docker under \`server/current\`)" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "${{ needs.changes.outputs.deploy_client }}" = "true" ]; then
            echo "- Client (static files under \`client/current\`)" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "${{ needs.changes.outputs.deploy_server }}" = "true" ]; then
            echo "- Database migrations (container entrypoint)" >> "$GITHUB_STEP_SUMMARY"
          fi
