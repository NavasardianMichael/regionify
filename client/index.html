<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>Regionify — Choropleth map &amp; data visualization tool</title>
    <meta
      name="description"
      content="AI-powered choropleth map builder: generate or import CSV, Excel, JSON or Google Sheets, visualize regions, export PNG, SVG, GIF, MP4 or PDF. Pay once."
    />
    <meta
      name="keywords"
      content="choropleth map, regional map, AI data generation, data parsing, CSV to map, Excel map, Google Sheets map, iframe embed, hosted public page, data visualization, SVG map"
    />

    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Web App Manifest -->
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#18294D" />
    <meta name="color-scheme" content="light" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://regionify.pro" />
    <meta
      property="og:title"
      content="Regionify — Choropleth map &amp; data visualization tool"
    />
    <meta
      property="og:description"
      content="Interactive choropleth maps: import and parse CSV, Excel, JSON, or Google Sheets; AI-assisted table generation; fuzzy region matching; custom legends; PNG, SVG, JPEG, GIF, MP4 and PDF export; animated time-series. Share via responsive iframe embeds or separately hosted public pages on higher badge tiers."
    />
    <meta property="og:image" content="https://regionify.pro/og-image.jpg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Regionify choropleth map visualizer — regional data mapped to color-coded SVG regions" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:site_name" content="Regionify" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://regionify.pro" />
    <meta
      name="twitter:title"
      content="Regionify — Choropleth map &amp; data visualization tool"
    />
    <meta
      name="twitter:description"
      content="Interactive choropleth maps: import and parse CSV, Excel, JSON, or Google Sheets; AI-assisted table generation; fuzzy region matching; custom legends; PNG, SVG, JPEG, GIF, MP4 and PDF export; animated time-series. Share via responsive iframe embeds or separately hosted public pages on higher badge tiers."
    />
    <meta name="twitter:image" content="https://regionify.pro/og-image.jpg" />
    <meta name="twitter:image:alt" content="Regionify choropleth map visualizer — regional data mapped to color-coded SVG regions" />

    <!-- Additional SEO -->
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Regionify" />
    <meta name="application-name" content="Regionify" />
    <link rel="canonical" href="https://regionify.pro" />

    <!-- Structured data for the main SPA entry -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "SoftwareApplication",
            "@id": "https://regionify.pro#software",
            "name": "Regionify",
            "applicationCategory": "DesignApplication",
            "applicationSubCategory": "Data Visualization",
            "operatingSystem": "Web",
            "softwareRequirements": "Web browser",
            "url": "https://regionify.pro/",
            "image": "https://regionify.pro/og-image.jpg",
            "description": "Interactive choropleth maps: import and parse CSV, Excel, JSON, or Google Sheets; AI-assisted table generation; fuzzy region matching; custom legends; PNG, SVG, JPEG, GIF, MP4 and PDF export; animated time-series. Share via responsive iframe embeds or separately hosted public pages on higher badge tiers.",
            "featureList": [
              "Import data from CSV, Excel, JSON and Google Sheets",
              "Fuzzy region matching — maps partial or approximate names automatically",
              "AI-assisted data table generation",
              "AI-assisted import parsing from unstructured or ambiguous data",
              "Custom legends, color scales and label formatting",
              "Export PNG, SVG, JPEG, GIF, MP4 and PDF",
              "Time-series animation with interactive timeline scrubber",
              "Embeddable responsive iframe",
              "Public hosted map pages with SEO title and description"
            ],
            "offers": [
              {
                "@type": "Offer",
                "name": "Observer",
                "price": "0",
                "priceCurrency": "USD",
                "description": "Free tier: core maps, JPEG export, up to 3 saved projects."
              },
              {
                "@type": "Offer",
                "name": "Explorer",
                "description": "One-time payment. PNG/SVG export, iframe embeds, public map pages, advanced styling, unlimited projects.",
                "priceSpecification": { "@type": "UnitPriceSpecification", "priceType": "https://schema.org/OneTimePurchase" }
              },
              {
                "@type": "Offer",
                "name": "Chronographer",
                "description": "One-time payment. Everything in Explorer plus time-series animation, GIF/MP4 export and Google Sheets live sync.",
                "priceSpecification": { "@type": "UnitPriceSpecification", "priceType": "https://schema.org/OneTimePurchase" }
              }
            ],
            "publisher": { "@id": "https://regionify.pro#organization" }
          },
          {
            "@type": "WebSite",
            "@id": "https://regionify.pro#website",
            "url": "https://regionify.pro",
            "name": "Regionify",
            "publisher": { "@id": "https://regionify.pro#organization" }
          },
          {
            "@type": "Organization",
            "@id": "https://regionify.pro#organization",
            "name": "Regionify",
            "url": "https://regionify.pro",
            "logo": { "@type": "ImageObject", "url": "https://regionify.pro/logo-high-resolution.png" }
          }
        ]
      }
    </script>

    <!-- Mobile Web App -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Regionify" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
