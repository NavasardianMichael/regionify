name: regionify

# Limit Docker's own log files to a small rolling buffer.
# Loki is the long-term log store; the local copy is only needed until Promtail ships it.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: '10m'
    max-file: '3'

services:
  postgres:
    image: postgres:17-alpine
    container_name: regionify-postgres
    restart: unless-stopped
    logging: *default-logging
    env_file:
      - '${REGIONIFY_ENV_FILE:?Set REGIONIFY_ENV_FILE to the absolute path of server/.env.production}'
    ports:
      - '127.0.0.1:5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-regionify}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - regionify-network

  redis:
    image: redis:7-alpine
    container_name: regionify-redis
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - regionify-network

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: regionify-server
    restart: unless-stopped
    logging: *default-logging
    ports:
      - '9002:9002'
    env_file:
      - '${REGIONIFY_ENV_FILE:?Set REGIONIFY_ENV_FILE to the absolute path of server/.env.production}'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - regionify-network

  loki:
    image: grafana/loki:3.3.2
    container_name: regionify-loki
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/config.yml
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://localhost:3100/ready || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - regionify-network

  promtail:
    image: grafana/promtail:3.3.2
    container_name: regionify-promtail
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - ./monitoring/promtail/promtail-prod-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - regionify-network

  grafana:
    image: grafana/grafana:11.4.0
    container_name: regionify-grafana
    restart: unless-stopped
    logging: *default-logging
    ports:
      - '127.0.0.1:${GRAFANA_PORT:-8002}:3000'
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    env_file:
      - '${REGIONIFY_ENV_FILE:?Set REGIONIFY_ENV_FILE to the absolute path of server/.env.production}'
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_AUTH_ANONYMOUS_ENABLED: 'false'
      GF_LOG_LEVEL: warn
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - regionify-network

volumes:
  postgres_data:
  redis_data:
  loki_data:
  grafana_data:

networks:
  regionify-network:
    driver: bridge
