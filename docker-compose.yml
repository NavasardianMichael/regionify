services:
  postgres:
    image: postgres:17-alpine
    container_name: regionify-postgres
    restart: unless-stopped
    env_file:
      - ./server/.env.development.local
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-regionify}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: regionify-redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  loki:
    image: grafana/loki:3.3.2
    container_name: regionify-loki
    restart: unless-stopped
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/config.yml
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://localhost:3100/ready || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

  promtail:
    image: grafana/promtail:3.3.2
    container_name: regionify-promtail
    restart: unless-stopped
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.4.0
    container_name: regionify-grafana
    restart: unless-stopped
    ports:
      - '${GRAFANA_PORT:-8002}:3000'
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: 'true'
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SERVER_ROOT_URL: 'http://localhost:${GRAFANA_PORT:-8002}'
      GF_LOG_LEVEL: warn
      # Email alerting — optional in dev; uncomment and fill in to test locally
      # GF_SMTP_ENABLED: 'true'
      # GF_SMTP_HOST: 'smtp.gmail.com:587'
      # GF_SMTP_USER: 'your@gmail.com'
      # GF_SMTP_PASSWORD: 'your-gmail-app-password'
      # GF_SMTP_FROM_ADDRESS: 'your@gmail.com'
    depends_on:
      loki:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  loki_data:
  grafana_data:
